<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 900 520'><rect width='900' height='520' rx='28' fill='#0f172a'/><text x='52' y='70' font-family='Inter,Arial' font-size='30' font-weight='800' fill='white'>Certification-ready test engineering</text><text x='52' y='105' font-family='Inter,Arial' font-size='16' fill='#cbd5e1'>How technical work becomes evidence that regulators, auditors and internal teams can trust.</text><g transform='translate(70 170)' font-family='Inter,Arial'><rect x='0' y='0' width='165' height='105' rx='18' fill='#1e293b' stroke='#38bdf8'/><text x='82' y='44' text-anchor='middle' fill='white' font-size='17' font-weight='800'>Plan</text><text x='82' y='72' text-anchor='middle' fill='#cbd5e1' font-size='13'>TEP / QTP</text><rect x='198' y='0' width='165' height='105' rx='18' fill='#1e293b' stroke='#2dd4bf'/><text x='280' y='44' text-anchor='middle' fill='white' font-size='17' font-weight='800'>Execute</text><text x='280' y='72' text-anchor='middle' fill='#cbd5e1' font-size='13'>dry runs / tests</text><rect x='396' y='0' width='165' height='105' rx='18' fill='#1e293b' stroke='#f59e0b'/><text x='478' y='44' text-anchor='middle' fill='white' font-size='17' font-weight='800'>Analyze</text><text x='478' y='72' text-anchor='middle' fill='#cbd5e1' font-size='13'>datasets / limits</text><rect x='594' y='0' width='165' height='105' rx='18' fill='#1e293b' stroke='#a78bfa'/><text x='676' y='44' text-anchor='middle' fill='white' font-size='17' font-weight='800'>Submit</text><text x='676' y='72' text-anchor='middle' fill='#cbd5e1' font-size='13'>evidence package</text><g stroke='#64748b' stroke-width='4'><path d='M165 52h33'/><path d='M363 52h33'/><path d='M561 52h33'/></g><rect x='70' y='190' width='620' height='70' rx='18' fill='#111827' stroke='#334155'/><text x='380' y='232' text-anchor='middle' fill='#e2e8f0' font-size='15'>Applicable experience: ANATEL, CISPR 22/32, DO-160G, DO-178 methods, FAA/ASTM lighting tests, EASA MTQG.</text></g></svg>
