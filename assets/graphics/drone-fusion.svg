<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 900 520'><rect width='900' height='520' rx='28' fill='#f8fafc'/><text x='52' y='70' font-family='Inter,Arial' font-size='30' font-weight='800' fill='#0f172a'>Drone swarm perception &amp; control</text><text x='52' y='105' font-family='Inter,Arial' font-size='16' fill='#475569'>IMU data, IR camera feedback, EKF sensor fusion and PID tuning for robust indoor logistics behavior.</text><g stroke='#94a3b8' stroke-width='3' fill='none'><path d='M210 265 C320 190 420 205 520 260 S680 350 780 260'/><path d='M165 330 C280 385 390 360 480 305 S650 180 760 220' stroke-dasharray='12 12'/></g><g font-family='Inter,Arial'><g transform='translate(130 190)'><circle r='48' fill='#dbeafe'/><text text-anchor='middle' y='6' font-size='16' font-weight='800' fill='#1e40af'>IMU</text></g><g transform='translate(310 145)'><circle r='48' fill='#dcfce7'/><text text-anchor='middle' y='6' font-size='16' font-weight='800' fill='#166534'>EKF</text></g><g transform='translate(490 235)'><circle r='54' fill='#ffedd5'/><text text-anchor='middle' y='0' font-size='16' font-weight='800' fill='#9a3412'>PID</text><text text-anchor='middle' y='21' font-size='12' fill='#9a3412'>tuning</text></g><g transform='translate(700 160)'><circle r='48' fill='#ede9fe'/><text text-anchor='middle' y='6' font-size='16' font-weight='800' fill='#5b21b6'>ROS2</text></g></g><g transform='translate(130 380)' font-family='Inter,Arial'><rect width='640' height='62' rx='18' fill='white' stroke='#e2e8f0'/><text x='24' y='38' font-size='15' fill='#475569'>Outcome focus: stable flight behavior, clearer imaging, automatic charging support and swarm show troubleshooting.</text></g></svg>
